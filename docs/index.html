<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Dashboard</title>
  <link rel="stylesheet" href="css/teams-theme.css">
</head>
<body>

  <!-- Header -->
  <header class="dashboard-header">
    <div class="header-left">
      <h1 class="header-title">Project Dashboard</h1>
      <select class="project-switcher" id="projectSwitcher" aria-label="Select project">
        <option value="">Loading projects...</option>
      </select>
    </div>
    <div class="header-right">
      <span id="lastUpdated">Last updated: —</span>
    </div>
  </header>

  <!-- Main Content -->
  <main class="dashboard-main" id="dashboardMain">

    <!-- Timeline Health Banner -->
    <section id="timelineHealth" aria-label="Timeline health">
      <div class="health-banner on-track">
        <span class="health-icon">&#9679;</span>
        <span class="health-text">Loading...</span>
      </div>
    </section>

    <!-- Status Overview Metrics -->
    <section id="statusOverview" aria-label="Status overview">
      <div class="metrics-row">
        <div class="metric-card total">
          <div class="metric-value" id="metricTotal">—</div>
          <div class="metric-label">Total Items</div>
        </div>
        <div class="metric-card done">
          <div class="metric-value" id="metricDone">—</div>
          <div class="metric-label">Done</div>
        </div>
        <div class="metric-card in-progress">
          <div class="metric-value" id="metricInProgress">—</div>
          <div class="metric-label">In Progress</div>
        </div>
        <div class="metric-card blocked">
          <div class="metric-value" id="metricBlocked">—</div>
          <div class="metric-label">Blocked</div>
        </div>
      </div>
      <div class="completion-bar-container">
        <div class="completion-bar-label">
          <span>Completion</span>
          <span id="completionPct">0%</span>
        </div>
        <div class="completion-bar">
          <div class="completion-bar-fill" id="completionFill" style="width: 0%"></div>
        </div>
      </div>
    </section>

    <!-- Gantt Chart -->
    <section class="card" id="ganttSection">
      <div class="card-header">Timeline — Estimated vs Actual</div>
      <div class="card-body scrollable-section">
        <div class="chart-container" id="ganttChart"></div>
      </div>
    </section>

    <!-- Phase Progress + Priority Breakdown -->
    <section class="two-col">
      <div class="card" id="phaseSection">
        <div class="card-header">Phase Progress</div>
        <div class="card-body">
          <div class="phase-list" id="phaseProgress"></div>
        </div>
      </div>
      <div class="card" id="prioritySection">
        <div class="card-header">Priority Breakdown</div>
        <div class="card-body">
          <div class="chart-container-sm" id="priorityChart"></div>
        </div>
      </div>
    </section>

    <!-- Burndown Chart -->
    <section class="card" id="burndownSection">
      <div class="card-header">Burndown</div>
      <div class="card-body">
        <div class="chart-container" id="burndownChart"></div>
      </div>
    </section>

    <!-- Issue Detail Table -->
    <section class="card" id="issueTableSection">
      <div class="card-header">
        <span>Issues</span>
        <div class="table-controls">
          <select class="table-filter" id="filterStatus" aria-label="Filter by status">
            <option value="">All Statuses</option>
          </select>
          <select class="table-filter" id="filterPriority" aria-label="Filter by priority">
            <option value="">All Priorities</option>
          </select>
        </div>
      </div>
      <div class="card-body scrollable-section" style="padding: 0;">
        <table class="issue-table" id="issueTable">
          <thead>
            <tr>
              <th data-sort="number"># <span class="sort-icon">&#9650;</span></th>
              <th data-sort="title">Title <span class="sort-icon">&#9650;</span></th>
              <th data-sort="status">Status <span class="sort-icon">&#9650;</span></th>
              <th data-sort="priority">Priority <span class="sort-icon">&#9650;</span></th>
              <th data-sort="phase">Phase <span class="sort-icon">&#9650;</span></th>
              <th data-sort="assignees">Assignee <span class="sort-icon">&#9650;</span></th>
            </tr>
          </thead>
          <tbody id="issueTableBody">
          </tbody>
        </table>
      </div>
    </section>

    <!-- Recent Activity -->
    <section class="card" id="activitySection">
      <div class="card-header">Recent Activity</div>
      <div class="card-body">
        <div class="activity-list" id="activityFeed">
          <div class="loading">Loading activity...</div>
        </div>
      </div>
    </section>

  </main>

  <!-- ECharts from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

  <!-- App Modules -->
  <script src="js/data-loader.js"></script>
  <script src="js/status-overview.js"></script>
  <script src="js/timeline-health.js"></script>
  <script src="js/phase-progress.js"></script>
  <script src="js/activity-feed.js"></script>
  <script src="js/issue-table.js"></script>
  <script src="js/priority-chart.js"></script>
  <script src="js/burndown-chart.js"></script>
  <script src="js/gantt-chart.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
